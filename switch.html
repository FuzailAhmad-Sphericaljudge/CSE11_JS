<html>
<body>
    <script type="text/javascript">
        var grade = 'A';
        switch(grade) {
            case 'A':
                document.write("Excellent!");
                break;
            case 'B':
                document.write("Good job!");
                break;
            case 'C':
                document.write("You can do better.");
                break;
            default:
                document.write("Invalid grade.");
        }
    </script>
</body>
</html>
