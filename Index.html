<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Result Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Student Result Calculator</h1>

    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="roll" placeholder="Roll Number">

    <input type="number" id="sub1" placeholder="Subject 1 Marks">
    <input type="number" id="sub2" placeholder="Subject 2 Marks">
    <input type="number" id="sub3" placeholder="Subject 3 Marks">
    <input type="number" id="sub4" placeholder="Subject 4 Marks">

    <div class="buttons">
        <button onclick="calculateResult()">Calculate</button>
        <button onclick="resetForm()">Reset</button>
    </div>

    <div id="result"></div>
</div>

<script src="Result.js"></script>
</body>
</html>
